meters:
  - name: contracted_service
    unit: varies
    aggregation: sum
    dimensions:
      - service
principles:
  - name: Visibility
    description: Consumption signal comes from Wintrust's commercial / treasury portals and contracted reporting; no public usage API exists.
  - name: Allocation
    description: Spend is allocated through the underlying contract (account, treasury product) rather than via API tags.
  - name: Optimization
    description: Optimization is commercial - account consolidation, product selection, contract renegotiation.
  - name: Accountability
    description: Treasury / finance is the natural owner; engineering owns only integration cost since no per-call price is published.
