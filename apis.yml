apis:
  - aid: wintrust-financial:wintrust-treasury-api-banking
    name: Wintrust Treasury Management API Banking (SFTP)
    tags:
      - Treasury Management
      - Commercial Banking
      - Payments
      - File Transfer
      - United States
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.wintrust.com/business-solutions/mid-market/banking/treasury-management.html
    properties:
      - type: Documentation
        url: https://www.wintrust.com/financial-education/2021/03/in-the-vault-with-treasury-management-focus-on-banking-technology.html
      - type: Documentation
        url: https://www.wintrustbank.com/commercial/resources/treasury-management/payables.html
      - type: Documentation
        url: https://www.wintrustbank.com/commercial/resources/treasury-management/receivables.html
    description: >-
      Wintrust's commercial "API banking" for treasury clients. Rather than a
      documented REST API, Wintrust connects business customers directly to its
      secure file transfer protocol (SFTP) for account balance and activity
      reporting, payment file exchange (Positive Pay, ACH/NACHA, domestic and
      international wires, EDI, lockbox) and data-format translation (CSV to
      NACHA, EDI 820, TXT, BAI2). Delivered through the i-BusinessBanking
      treasury platform; no public OpenAPI specification, sandbox or self-serve
      developer portal is published — access is arranged through Treasury
      Management onboarding.
  - aid: wintrust-financial:wintrust-open-banking-aggregator-access
    name: Wintrust Open Banking Data Access (Plaid, aggregator-mediated)
    tags:
      - Open Banking
      - Data Aggregation
      - Financial Data
      - Consumer Banking
      - United States
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.openbankingtracker.com/provider/wintrust-bank-na-ibusiness-banking
    properties:
      - type: Documentation
        url: https://plaid.com/institutions/
      - type: Documentation
        url: https://www.openbankingtracker.com/provider/wintrust-bank-na-ibusiness-banking
    description: >-
      Wintrust does not expose a direct consumer open-banking API. Third-party
      applications reach Wintrust / iBusinessBanking account balances,
      transaction history and account-holder data through open-banking
      aggregators; Plaid is the confirmed aggregator that supports Wintrust in
      the United States. There is no documented FDX endpoint, no stated CFPB
      1033 data-access program and no Akoya/MX/Finicity listing found at review
      time — access is aggregator-only rather than first-party.
