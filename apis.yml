description: >-
  Wintrust Financial Corporation is a Rosemont, Illinois-based financial holding
  company operating a network of chartered community banks (Wintrust Bank, N.A.
  and its affiliates) primarily across Illinois, Wisconsin, Indiana and Florida,
  plus specialty lending, wealth management and mortgage businesses. Wintrust does
  not publish a first-party public developer portal or downloadable API
  specifications; its programmatic surface is delivered through commercial
  treasury management. Wintrust describes "API banking" that connects businesses
  directly to its secure file transfer protocol (SFTP) for account balance and
  activity reporting, payment files (Positive Pay, ACH, wires, EDI, lockbox) and
  data-format translation (NACHA, EDI 820, BAI2). Consumer and small-business
  account data is reachable to third parties through open-banking aggregators —
  Plaid is the confirmed aggregator supporting Wintrust / iBusinessBanking access.
